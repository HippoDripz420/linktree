<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

<meta name="color-scheme" content="dark">

<title>Hippos Drip Farm · Links</title>

<meta property="og:description" content="🌿 Real Terps · Real Flavor · Real Vibes">
<meta property="og:image" content="logo-avatar.jpeg">
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" href="logo-avatar.jpeg" type="image/jpeg">
<link rel="apple-touch-icon" href="logo-avatar.jpeg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep: #050a04;
  --bg-jungle: #0a1408;
  --bg-mid: #142918;
  --leaf: #b5e563;
  --leaf-bright: #d4ff7f;
  --leaf-dim: #7ec850;
  --purple: #4a1f6e;
  --purple-bright: #6b2d8f;
  --gold-lamp: #e89a4f;
  --ink: #0a0a08;
  --ink-soft: rgba(10, 10, 8, 0.65);
  --paper: #f5f1e6;
  --paper-dim: rgba(245, 241, 230, 0.6);
  --paper-muted: rgba(245, 241, 230, 0.35);

  --radius: 16px;
  --radius-lg: 22px;
  --ease: cubic-bezier(0.34, 1.4, 0.64, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  min-height: 100vh;
  font-family: 'Space Grotesk', system-ui, sans-serif;
  color: var(--paper);
  background: var(--bg-deep);
  overflow-x: hidden;
  position: relative;
  line-height: 1.5;
  font-weight: 500;
}

/* === LUSH BACKGROUND === */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.bg-base {
  z-index: -5;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(181, 229, 99, 0.12), transparent 60%),
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(74, 31, 110, 0.25), transparent 65%),
    radial-gradient(ellipse 100% 80% at 50% 50%, rgba(20, 41, 24, 0.5), transparent 70%),
    linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-jungle) 50%, var(--bg-deep) 100%);
}

/* Dense leaf canopy at top — SVG silhouettes */
.bg-canopy {
  z-index: -4;
  top: -10px;
  height: 200px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 200' preserveAspectRatio='none'><path d='M0 0 L0 60 Q20 80 40 50 Q60 90 80 60 Q100 110 120 70 Q140 100 160 60 Q180 95 200 65 Q220 100 240 60 Q260 95 280 65 Q300 110 320 70 Q340 95 360 55 Q380 90 400 60 L400 0 Z' fill='%230f1f0a' opacity='0.9'/><path d='M0 0 L0 30 Q30 55 60 25 Q90 60 120 30 Q150 55 180 25 Q210 60 240 30 Q270 55 300 25 Q330 60 360 30 Q390 50 400 25 L400 0 Z' fill='%23172b13' opacity='0.95'/></svg>") repeat-x;
  background-size: 400px 200px;
}

/* Bokeh light orbs (warm lamp ambiance) */
.lamp {
  position: fixed;
  border-radius: 50%;
  filter: blur(70px);
  pointer-events: none;
  z-index: -3;
  animation: lamp-pulse 5s ease-in-out infinite alternate;
}
.lamp-1 {
  width: 260px; height: 260px;
  background: radial-gradient(circle, var(--gold-lamp), transparent 70%);
  top: 5%; left: -80px;
  opacity: 0.45;
  animation-delay: 0s;
}
.lamp-2 {
  width: 220px; height: 220px;
  background: radial-gradient(circle, var(--gold-lamp), transparent 70%);
  top: 25%; right: -60px;
  opacity: 0.35;
  animation-delay: 1.5s;
}
.lamp-3 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, var(--leaf), transparent 70%);
  bottom: 10%; left: 30%;
  opacity: 0.15;
  animation-delay: 3s;
}

@keyframes lamp-pulse {
  0%, 100% { opacity: var(--o, 0.4); transform: scale(1); }
  50% { opacity: calc(var(--o, 0.4) * 1.4); transform: scale(1.05); }
}

/* Trichome sparkles - cannabis dust */
.sparkles {
  z-index: -2;
  background-image:
    radial-gradient(circle 1.5px at 15% 22%, rgba(181, 229, 99, 0.4) 0%, transparent 100%),
    radial-gradient(circle 1px at 45% 35%, rgba(212, 255, 127, 0.5) 0%, transparent 100%),
    radial-gradient(circle 2px at 78% 18%, rgba(181, 229, 99, 0.3) 0%, transparent 100%),
    radial-gradient(circle 1px at 25% 65%, rgba(212, 255, 127, 0.4) 0%, transparent 100%),
    radial-gradient(circle 1.5px at 65% 55%, rgba(181, 229, 99, 0.35) 0%, transparent 100%),
    radial-gradient(circle 1px at 88% 75%, rgba(212, 255, 127, 0.4) 0%, transparent 100%),
    radial-gradient(circle 2px at 10% 88%, rgba(181, 229, 99, 0.3) 0%, transparent 100%),
    radial-gradient(circle 1px at 55% 92%, rgba(212, 255, 127, 0.35) 0%, transparent 100%);
  animation: drift 12s ease-in-out infinite alternate;
}

@keyframes drift {
  0% { transform: translate(0, 0); }
  100% { transform: translate(8px, -6px); }
}

/* Grain texture */
.grain {
  z-index: -1;
  opacity: 0.05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  mix-blend-mode: overlay;
}

/* === LAYOUT === */
.page {
  max-width: 500px;
  margin: 0 auto;
  padding: 48px 24px 60px;
  position: relative;
  z-index: 1;
}

/* === HERO === */
.hero {
  text-align: center;
  margin-bottom: 36px;
  position: relative;
  animation: fade-up 0.7s var(--ease-out) both;
}

@keyframes fade-up {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Logo display: round with green/purple aura glow */
.logo-mount {
  position: relative;
  width: 224px;
  height: 224px;
  margin: 0 auto 28px;
}

.logo-mount::before,
.logo-mount::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  pointer-events: none;
}

/* Aura: pulsing green-purple gradient */
.logo-mount::before {
  background: conic-gradient(from 0deg,
    var(--leaf) 0%,
    var(--purple-bright) 25%,
    var(--leaf) 50%,
    var(--purple) 75%,
    var(--leaf) 100%);
  filter: blur(14px);
  opacity: 0.6;
  animation: rotate-aura 8s linear infinite;
}

@keyframes rotate-aura {
  to { transform: rotate(360deg); }
}

/* Inner ring border */
.logo-mount::after {
  inset: -2px;
  background: linear-gradient(135deg, var(--leaf-bright), var(--purple-bright));
  z-index: 1;
}

.logo {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background-image: url('logo-avatar.jpeg');
  background-size: cover;
  background-position: center;
  z-index: 2;
  box-shadow:
    inset 0 -20px 40px rgba(0, 0, 0, 0.4),
    0 12px 40px rgba(0, 0, 0, 0.5),
    0 0 60px rgba(181, 229, 99, 0.25);
}

/* === BRAND IDENTITY === */
.brand-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.4rem;
  line-height: 0.95;
  letter-spacing: 0.04em;
  margin-bottom: 14px;
  text-transform: uppercase;
  color: var(--paper);
  text-shadow:
    0 2px 0 var(--purple),
    0 0 30px rgba(181, 229, 99, 0.3);
}

.brand-name .drip-letter {
  color: var(--leaf-bright);
  display: inline-block;
  text-shadow:
    0 2px 0 var(--purple),
    0 4px 0 var(--purple),
    0 0 24px rgba(181, 229, 99, 0.6);
}

.brand-statement {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  background: rgba(181, 229, 99, 0.08);
  border: 1px solid rgba(181, 229, 99, 0.25);
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--leaf-bright);
  margin-bottom: 14px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.brand-statement::before,
.brand-statement::after {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--leaf);
  opacity: 0.5;
}

.brand-tagline {
  font-family: 'Permanent Marker', cursive;
  font-size: 1.15rem;
  color: var(--paper);
  letter-spacing: 0.01em;
  opacity: 0.95;
  transform: rotate(-1deg);
  display: inline-block;
}

.brand-tagline .accent { color: var(--leaf-bright); }

/* === LINK CARDS === */
.links {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 44px;
}

.link-card {
  position: relative;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  background: rgba(20, 41, 24, 0.65);
  color: var(--paper);
  border-radius: var(--radius);
  border: 1px solid rgba(181, 229, 99, 0.18);
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
  transition: all 0.3s var(--ease-out);
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  animation: card-in 0.6s var(--ease-out) forwards;
}

@keyframes card-in {
  to { opacity: 1; transform: translateY(0); }
}

.link-card:nth-child(1) { animation-delay: 0.15s; }
.link-card:nth-child(2) { animation-delay: 0.25s; }
.link-card:nth-child(3) { animation-delay: 0.35s; }

/* Hover glow line top */
.link-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    var(--leaf-bright),
    transparent);
  opacity: 0;
  transition: opacity 0.3s var(--ease-out);
}

.link-card:hover {
  border-color: rgba(181, 229, 99, 0.5);
  background: rgba(30, 56, 32, 0.8);
  transform: translateY(-2px);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.4),
    0 0 24px rgba(181, 229, 99, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
}

.link-card:hover::before { opacity: 0.8; }

.link-card:active {
  transform: translateY(0);
}

.link-icon {
  flex-shrink: 0;
  width: 46px;
  height: 46px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.15),
    0 2px 8px rgba(0, 0, 0, 0.3);
}

.link-icon svg {
  width: 24px;
  height: 24px;
  fill: white;
}

.link-icon.threema { background: linear-gradient(135deg, #3FE669, #2BA84A); }
.link-icon.threema svg { fill: #0a0a08; }

.link-icon.signal { background: linear-gradient(135deg, #3A76F0, #2256C7); }

.link-icon.instagram {
  background: linear-gradient(135deg,
    #fdcd5c 0%,
    #f78135 25%,
    #d63d77 50%,
    #962fbf 75%,
    #4f5bd5 100%);
}
.link-icon.instagram svg { fill: none; stroke: white; stroke-width: 2; }

.link-text {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.link-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.25rem;
  letter-spacing: 0.06em;
  line-height: 1;
  color: var(--paper);
}

.link-sub {
  font-size: 0.78rem;
  color: var(--paper-dim);
  font-weight: 500;
  letter-spacing: 0.01em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.link-arrow {
  flex-shrink: 0;
  color: var(--leaf-bright);
  opacity: 0.6;
  transition: all 0.3s var(--ease-out);
}

.link-arrow svg {
  width: 18px;
  height: 18px;
  display: block;
}

.link-card:hover .link-arrow {
  opacity: 1;
  transform: translateX(4px);
}

/* === LEAF DECORATION === */
.leaf-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 32px 0 20px;
  opacity: 0;
  animation: fade-up 0.6s var(--ease-out) 0.5s forwards;
}

.leaf-divider .line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(181, 229, 99, 0.3),
    transparent);
}

.leaf-divider svg {
  width: 22px;
  height: 22px;
  fill: var(--leaf);
  opacity: 0.7;
}

/* === FOOTER === */
.footer {
  text-align: center;
  font-size: 0.75rem;
  color: var(--paper-muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  opacity: 0;
  animation: fade-up 0.6s var(--ease-out) 0.6s forwards;
}

.footer .heart { color: var(--leaf); }

/* === RESPONSIVE === */
@media (max-width: 380px) {
  .page { padding: 36px 18px 50px; }
  .logo-mount { width: 192px; height: 192px; }
  .brand-name { font-size: 2.8rem; }
  .brand-tagline { font-size: 1rem; }
  .link-card { padding: 16px 16px; gap: 12px; }
  .link-icon { width: 42px; height: 42px; }
  .link-title { font-size: 1.15rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
